<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Master SRS | Lux Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; 
            background: linear-gradient(135deg, #f0f4ff 0%, #fff1f2 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        .perspective { perspective: 1000px; }
        .card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back { transform: rotateY(180deg); }
        .nav-active {
            background: rgba(79, 70, 229, 0.15);
            color: #4f46e5;
            box-shadow: inset 0 0 10px rgba(79, 70, 229, 0.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div id="app" class="w-full max-w-md h-screen flex flex-col p-5 relative z-10">
        
        <!-- Animated Background Accents -->
        <div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-indigo-200 rounded-full blur-[100px] opacity-40 z-0"></div>
        <div class="fixed bottom-[-10%] right-[-10%] w-64 h-64 bg-rose-200 rounded-full blur-[100px] opacity-40 z-0"></div>

        <!-- Header -->
        <header class="flex justify-between items-center mb-5 shrink-0">
            <div>
                <h1 class="text-xl font-black tracking-tighter leading-none text-slate-800">J-MASTER <span class="text-indigo-600">SRS</span></h1>
                <div id="daily-stats" class="flex gap-2 text-[9px] font-bold text-slate-500 mt-2">
                    <span id="stat-new" class="glass px-2.5 py-1 rounded-full uppercase border-white/60">BARU: --</span>
                    <span id="stat-rev" class="glass px-2.5 py-1 rounded-full uppercase border-white/60">REV: --</span>
                </div>
            </div>
            <button onclick="switchView('settings')" class="glass p-2.5 rounded-2xl text-slate-400 hover:text-indigo-600 transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </header>

        <!-- Main Display -->
        <main class="flex-1 overflow-hidden relative">
            
            <!-- VIEW: Study -->
            <section id="view-study" class="view h-full flex flex-col animate-fade">
                <div id="study-status" class="flex-1 flex flex-col items-center justify-center text-center p-6 hidden">
                    <div id="status-icon" class="text-5xl mb-6">🎯</div>
                    <h2 id="status-title" class="text-xl font-black text-slate-800 uppercase tracking-tight">Sesi Belajar</h2>
                    <p id="status-desc" class="text-slate-500 text-[10px] font-bold mt-2 mb-10 leading-relaxed px-10 uppercase tracking-widest opacity-60">Fokus dan capai targetmu.</p>
                    <button onclick="startSession()" class="glass bg-slate-900 text-white text-[10px] font-black uppercase tracking-[0.2em] px-10 py-4 rounded-2xl shadow-xl active:scale-95 transition-all">Mulai Sesi</button>
                </div>

                <div id="study-active" class="flex-1 flex flex-col hidden overflow-hidden">
                    <div class="flex items-center gap-3 mb-4 px-1 shrink-0">
                        <span id="session-counter" class="text-[9px] font-black text-slate-300 uppercase tracking-widest tabular-nums">0 / 0</span>
                        <div class="flex-1 h-1.5 glass rounded-full overflow-hidden border-white/40">
                            <div id="session-progress" class="h-full bg-indigo-500 transition-all duration-500 w-0"></div>
                        </div>
                    </div>
                    <div class="flex-1 perspective relative">
                        <div id="flashcard" class="card-inner w-full h-full relative cursor-pointer" onclick="flipCard()">
                            <div class="card-front glass absolute inset-0 rounded-[2.5rem] flex flex-col items-center justify-center p-6">
                                <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-6">Pertanyaan</span>
                                <div id="display-front" class="text-4xl font-bold text-slate-800 tracking-tighter">--</div>
                                <div class="absolute bottom-10 text-indigo-400 text-[9px] font-black uppercase animate-pulse tracking-widest">Tap to flip</div>
                            </div>
                            <div class="card-back glass absolute inset-0 rounded-[2.5rem] flex flex-col items-center justify-center p-6 text-center border-indigo-100">
                                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-3">Jawaban</span>
                                <div id="display-reading" class="text-sm text-indigo-500 font-bold mb-1 tracking-tight">--</div>
                                <div id="display-meaning" class="text-lg font-black text-slate-800 leading-tight px-4">--</div>
                            </div>
                        </div>
                    </div>
                    <div id="srs-actions" class="mt-6 grid grid-cols-2 gap-3 opacity-0 pointer-events-none translate-y-6 transition-all duration-300 shrink-0">
                        <button onclick="handleRate(false)" class="glass py-4 rounded-2xl font-black text-[10px] text-orange-600 uppercase tracking-widest active:bg-orange-50/50">Ulang (Susah)</button>
                        <button onclick="handleRate(true)" class="glass bg-indigo-600 py-4 rounded-2xl font-black text-[10px] text-white uppercase tracking-widest shadow-lg active:scale-95 transition-all">Lulus (Mudah)</button>
                    </div>
                </div>
            </section>

            <!-- VIEW: Kana -->
            <section id="view-kana" class="view h-full flex flex-col hidden animate-fade">
                <div id="kana-setup" class="h-full flex flex-col items-center justify-center text-center p-6">
                    <div class="w-20 h-20 glass rounded-[2rem] flex items-center justify-center mb-6 text-3xl shadow-sm border-white">あ</div>
                    <h2 class="text-lg font-black text-slate-800 tracking-tight">Kana Blitz</h2>
                    <p class="text-[10px] text-slate-400 font-bold px-12 mt-1 mb-8 uppercase tracking-widest">Reading Speed Trainer.</p>
                    <div class="glass p-4 rounded-3xl w-full space-y-3 mb-8">
                        <button onclick="toggleKana('hira')" id="btn-hira" class="w-full flex justify-between items-center p-4 rounded-2xl border text-[11px] font-black transition-all bg-indigo-50/50 border-indigo-200/50 text-indigo-700">
                            <span>HIRAGANA (あ)</span> <span class="check-icon">✓</span>
                        </button>
                        <button onclick="toggleKana('kata')" id="btn-kata" class="w-full flex justify-between items-center p-4 rounded-2xl border text-[11px] font-black transition-all bg-slate-50/30 border-slate-200/30 text-slate-400">
                            <span>KATAKANA (ア)</span> <span class="check-icon hidden">✓</span>
                        </button>
                    </div>
                    <button onclick="startKanaQuiz()" class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all shadow-md">Start Quiz</button>
                </div>
                <div id="kana-active" class="h-full flex flex-col hidden relative">
                    <div class="flex justify-between items-center mb-4 px-1 shrink-0">
                        <div class="flex gap-2">
                            <span id="kana-score" class="glass px-4 py-1.5 rounded-full text-[9px] font-black uppercase text-slate-600">Score: 0</span>
                            <span id="kana-timer" class="glass px-4 py-1.5 rounded-full text-[9px] font-black text-indigo-600 tabular-nums">0:00</span>
                        </div>
                        <button onclick="stopKanaQuiz()" class="text-rose-500 active:scale-90 p-1"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></button>
                    </div>
                    <div class="flex-1 glass rounded-[3rem] flex items-center justify-center p-8 relative overflow-hidden">
                        <div id="kana-display" class="text-7xl font-black text-slate-800 z-10">--</div>
                    </div>
                    <div id="kana-options" class="grid grid-cols-2 gap-3 mt-6 shrink-0"></div>
                </div>
            </section>

            <!-- VIEW: List -->
            <section id="view-list" class="view h-full flex flex-col hidden animate-fade">
                <h2 class="text-sm font-black text-slate-800 mb-5 flex justify-between items-center px-1">
                    Koleksi <span id="list-count" class="glass px-3 py-0.5 rounded-full text-[9px] text-indigo-600 font-black tracking-widest">0</span>
                </h2>
                <div id="card-list" class="flex-1 overflow-y-auto space-y-2.5 pr-1 custom-scrollbar"></div>
            </section>

            <!-- VIEW: Settings -->
            <section id="view-settings" class="view h-full flex flex-col hidden animate-fade">
                <h2 class="text-sm font-black text-slate-800 mb-6 px-1">Settings</h2>
                <div class="space-y-4">
                    <div class="glass p-6 rounded-3xl space-y-6">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Kartu Baru / Hari</label>
                            <input type="number" id="input-new-limit" class="w-full bg-slate-50/50 border-none rounded-xl p-4 text-[11px] font-bold outline-none ring-1 ring-slate-100 focus:ring-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Review / Hari</label>
                            <input type="number" id="input-rev-limit" class="w-full bg-slate-50/50 border-none rounded-xl p-4 text-[11px] font-bold outline-none ring-1 ring-slate-100 focus:ring-indigo-500 transition-all">
                        </div>
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-slate-900 text-white text-[10px] font-black uppercase py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Update Settings</button>
                    <button onclick="resetAllData()" class="w-full bg-white/40 text-rose-500 border border-rose-100 text-[9px] font-black uppercase py-3 rounded-xl active:bg-rose-50 transition-all">Reset Progress</button>
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="mt-5 glass rounded-[2.5rem] p-1.5 flex gap-1 shrink-0 z-20">
            <button onclick="switchView('study')" id="nav-study" class="nav-btn flex-1 py-3.5 rounded-full flex flex-col items-center justify-center gap-1 nav-active transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Study</span>
            </button>
            <button onclick="switchView('kana')" id="nav-kana" class="nav-btn flex-1 py-3.5 rounded-full flex flex-col items-center justify-center gap-1 text-slate-400 hover:bg-white/40 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Kana</span>
            </button>
            <button onclick="switchView('list')" id="nav-list" class="nav-btn flex-1 py-3.5 rounded-full flex flex-col items-center justify-center gap-1 text-slate-400 hover:bg-white/40 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">List</span>
            </button>
        </nav>

        <div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 px-6 py-2.5 rounded-full text-[9px] font-black uppercase text-white shadow-2xl transition-all opacity-0 pointer-events-none z-50"></div>
    </div>

    <script>
        // --- N5 KANJI DATASET ---
        const ALL_KANJI = [
            {f:'一',r:'いち',m:'Satu'},{f:'二',r:'に',m:'Dua'},{f:'三',r:'さん',m:'Tiga'},{f:'四',r:'よん',m:'Empat'},{f:'五',r:'ご',m:'Lima'},{f:'六',r:'ろく',m:'Enam'},{f:'七',r:'なな',m:'Tujuh'},{f:'八',r:'はち',m:'Delapan'},{f:'九',r:'きゅう',m:'Sembilan'},{f:'十',r:'じゅう',m:'Sepuluh'},{f:'百',r:'ひゃく',m:'Ratus'},{f:'千',r:'せん',m:'Ribuan'},{f:'万',r:'まん',m:'Puluh ribu'},{f:'円',r:'えん',m:'Yen'},{f:'半',r:'はん',m:'Setengah'},
            {f:'右',r:'みぎ',m:'Kanan'},{f:'左',r:'ひだり',m:'Kiri'},{f:'上',r:'うえ',m:'Atas'},{f:'下',r:'した',m:'Bawah'},{f:'前',r:'まえ',m:'Depan'},{f:'後ろ',r:'うしろ',m:'Belakang'},{f:'中',r:'なか',m:'Dalam'},{f:'外',r:'そと',m:'Luar'},{f:'間',r:'あいだ',m:'Antara'},{f:'西',r:'にし',m:'Barat'},{f:'東',r:'ひがし',m:'Timur'},{f:'北',r:'きた',m:'Utara'},{f:'南',r:'みなみ',m:'Selatan'},
            {f:'雨',r:'あめ',m:'Hujan'},{f:'火',r:'ひ',m:'Api'},{f:'水',r:'みず',m:'Air'},{f:'空',r:'そら',m:'Langit'},{f:'花',r:'はな',m:'Bunga'},{f:'魚',r:'さかな',m:'Ikan'},{f:'山',r:'やま',m:'Gunung'},{f:'川',r:'かわ',m:'Sungai'},{f:'木',r:'き',m:'Pohon'},{f:'土',r:'つち',m:'Tanah'},{f:'天',r:'てん',m:'Cuaca'},{f:'雪',r:'ゆき',m:'Salju'},{f:'海',r:'うみ',m:'Laut'},{f:'空気',r:'くうき',m:'Udara'},
            {f:'飲む',r:'のむ',m:'Minum'},{f:'食べる',r:'たべる',m:'Makan'},{f:'見る',r:'みる',m:'Melihat'},{f:'休む',r:'やすむ',m:'Istirahat'},{f:'会う',r:'あう',m:'Bertemu'},{f:'言う',r:'いう',m:'Berkata'},{f:'行く',r:'いく',m:'Pergi'},{f:'書く',r:'かく',m:'Menulis'},{f:'読む',r:'よむ',m:'Membaca'},{f:'買う',r:'かう',m:'Membeli'},{f:'入る',r:'はいる',m:'Masuk'},{f:'聞く',r:'きく',m:'Mendengar'},{f:'来る',r:'くる',m:'Datang'},{f:'話す',r:'はなす',m:'Berbicara'},{f:'持つ',r:'もつ',m:'Membawa'},{f:'待つ',r:'まつ',m:'Menunggu'},{f:'教える',r:'おしえる',m:'Memberitahu'},{f:'働く',r:'はたらく',m:'Bekerja'},{f:'借りる',r:'かりる',m:'Meminjam'},{f:'貸す',r:'かす',m:'Meminjamkan'},{f:'返す',r:'かえす',m:'Mengembalikan'},
            {f:'安い',r:'やすい',m:'Murah'},{f:'高い',r:'たかい',m:'Tinggi/Mahal'},{f:'古い',r:'ふるい',m:'Lama/Usang'},{f:'新しい',r:'あたらしい',m:'Baru'},{f:'大きい',r:'おおきい',m:'Besar'},{f:'小さい',r:'ちいさい',m:'Kecil'},{f:'長い',r:'ながい',m:'Panjang'},{f:'短い',r:'みじかい',m:'Pendek'},{f:'多い',r:'おおい',m:'Banyak'},{f:'少ない',r:'すくない',m:'Sedikit'},{f:'明るい',r:'あかるい',m:'Terang/Ceria'},{f:'暑い',r:'あつい',m:'Panas (cuaca)'},{f:'寒い',r:'さむい',m:'Dingin (cuaca)'},{f:'冷たい',r:'つめたい',m:'Dingin (benda)'},
            {f:'年',r:'ねん',m:'Tahun'},{f:'月',r:'つき',m:'Bulan'},{f:'日',r:'ひ',m:'Hari'},{f:'時',r:'とき',m:'Waktu'},{f:'分',r:'ふん',m:'Menit'},{f:'週',r:'しゅう',m:'Minggu'},{f:'午前',r:'ごぜん',m:'Pagi (AM)'},{f:'午後',r:'ごご',m:'Siang (PM)'},{f:'朝',r:'あさ',m:'Pagi'},{f:'昼',r:'ひる',m:'Siang'},{f:'夜',r:'よる',m:'Malam'},{f:'月曜日',r:'げつようび',m:'Senin'},{f:'火曜日',r:'かようび',m:'Selasa'},{f:'水曜日',r:'すいようび',m:'Rabu'},{f:'木曜日',r:'もくようび',m:'Kamis'},{f:'金曜日',r:'きんようび',m:'Jumat'},{f:'土曜日',r:'どようび',m:'Sabtu'},{f:'日曜日',r:'にちようび',m:'Minggu'},
            {f:'人',r:'ひと',m:'Orang'},{f:'男',r:'おとこ',m:'Laki-laki'},{f:'女',r:'おんな',m:'Perempuan'},{f:'子',r:'こ',m:'Anak'},{f:'父',r:'ちち',m:'Ayah'},{f:'母',r:'はは',m:'Ibu'},{f:'姉',r:'あね',m:'Kakak perempuan'},{f:'兄',r:'あに',m:'Kakak laki-laki'},{f:'妹',r:'いもうと',m:'Adik perempuan'},{f:'弟',r:'おとうと',m:'Adik laki-laki'},{f:'兄弟',r:'きょうだい',m:'Saudara'},{f:'友達',r:'ともだち',m:'Teman'},{f:'大人',r:'おとな',m:'Dewasa'},{f:'私',r:'わたし',m:'Saya'},
            {f:'駅',r:'えき',m:'Stasiun'},{f:'学校',r:'がっこう',m:'Sekolah'},{f:'高校',r:'こうこう',m:'SMA'},{f:'大学',r:'だいがく',m:'Universitas'},{f:'会社',r:'かいしゃ',m:'Perusahaan'},{f:'店',r:'みせ',m:'Toko'},{f:'病院',r:'びょういん',m:'Rumah sakit'},{f:'公園',r:'こうえん',m:'Taman'},{f:'国',r:'くに',m:'Negara'},{f:'道',r:'みち',m:'Jalan'},{f:'東京',r:'とうきょう',m:'Tokyo'},{f:'京都',r:'きょうと',m:'Kyoto'}
        ];

        const KANA_POOL = {
            hira: { 'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','さ':'sa','し':'shi','す':'su','せ':'se','そ':'so','た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to','な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho','ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'wo','ん':'n' },
            kata: { 'ア':'a','イ':'i','ウ':'u','エ':'e','オ':'o','カ':'ka','キ':'ki','ク':'ku','ケ':'ke','コ':'ko','サ':'sa','シ':'shi','ス':'su','セ':'se','ソ':'so','タ':'ta','チ':'chi','ツ':'tsu','て':'te','ト':'to','ナ':'na','ニ':'ni','ヌ':'nu','ネ':'ne','ノ':'no','ハ':'ha','ヒ':'hi','フ':'fu','ヘ':'he','ホ':'ho','マ':'ma','ミ':'mi','ム':'mu','メ':'me','モ':'mo','ヤ':'ya','ユ':'yu','ヨ':'yo','ラ':'ra','リ':'ri','ル':'ru','レ':'re','ロ':'ro','ワ':'wa','ヲ':'wo','ン':'n' }
        };

        // --- APP STATE ---
        let cards = [];
        let settings = { newLimit: 10, reviewLimit: 20, dailyReset: "", newDoneToday: 0, reviewDoneToday: 0 };
        let activeQueue = [];
        let isFlipped = false;
        let kanaConfig = { hira: true, kata: false };
        let kanaScore = 0;
        let kanaTime = 0;
        let kanaInterval = null;
        let currentKanaTarget = null;

        const init = () => {
            const storedCards = localStorage.getItem('jmaster_v9_cards');
            const storedSettings = localStorage.getItem('jmaster_v9_settings');
            const today = new Date().toDateString();

            if (storedCards) cards = JSON.parse(storedCards);
            else {
                cards = ALL_KANJI.map(k => ({ ...k, repetitions: 0, interval: 0, ease: 2.5, nextReview: 0, id: Math.random().toString(36).substr(2, 9) }));
                saveCards();
            }

            if (storedSettings) {
                settings = JSON.parse(storedSettings);
                if (settings.dailyReset !== today) {
                    settings.dailyReset = today;
                    settings.newDoneToday = 0;
                    settings.reviewDoneToday = 0;
                    saveSettings();
                }
            } else {
                settings.dailyReset = today;
                saveSettings();
            }

            updateUI();
            renderList();
        };

        // --- SRS ---
        const startSession = () => {
            const now = Date.now();
            const dueRev = cards.filter(c => c.repetitions > 0 && c.nextReview <= now);
            const newCards = cards.filter(c => c.repetitions === 0);
            const remNew = settings.newLimit - settings.newDoneToday;
            const remRev = settings.reviewLimit - settings.reviewDoneToday;
            
            activeQueue = [...dueRev.slice(0, remRev), ...newCards.slice(0, remNew)].sort(() => Math.random() - 0.5);
            if (activeQueue.length === 0) return;
            updateUI();
        };

        const handleRate = (isEasy) => {
            const current = activeQueue[0];
            if (!current) return;
            setIsFlipped(false);

            setTimeout(() => {
                if (isEasy) {
                    const original = cards.find(c => c.id === current.id);
                    const isNew = original.repetitions === 0;
                    if (original.repetitions === 0) original.interval = 1;
                    else if (original.repetitions === 1) original.interval = 4;
                    else original.interval = Math.round(original.interval * original.ease);
                    original.repetitions++;
                    original.ease = Math.min(3.0, original.ease + 0.1);
                    original.nextReview = Date.now() + (original.interval * 24 * 60 * 60 * 1000);
                    if (isNew) settings.newDoneToday++;
                    else settings.reviewDoneToday++;
                    activeQueue.shift();
                } else {
                    activeQueue.push(activeQueue.shift());
                }
                saveCards();
                saveSettings();
                updateUI();
            }, 300);
        };

        const setIsFlipped = (val) => {
            isFlipped = val;
            const card = document.getElementById('flashcard');
            const actions = document.getElementById('srs-actions');
            if(val) {
                card.classList.add('flipped');
                actions.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-6');
            } else {
                card.classList.remove('flipped');
                actions.classList.add('opacity-0', 'pointer-events-none', 'translate-y-6');
            }
        };

        window.flipCard = () => { if(!isFlipped) setIsFlipped(true); };

        // --- KANA ---
        window.startKanaQuiz = () => {
            if (!kanaConfig.hira && !kanaConfig.kata) return showToast("Pick Kana type!", "error");
            kanaScore = 0; kanaTime = 0;
            document.getElementById('kana-setup').classList.add('hidden');
            document.getElementById('kana-active').classList.remove('hidden');
            clearInterval(kanaInterval);
            kanaInterval = setInterval(() => {
                kanaTime++;
                const m = Math.floor(kanaTime/60);
                const s = kanaTime%60;
                document.getElementById('kana-timer').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
            nextKana();
        };

        const nextKana = () => {
            let pool = {};
            if (kanaConfig.hira) pool = {...pool, ...KANA_POOL.hira};
            if (kanaConfig.kata) pool = {...pool, ...KANA_POOL.kata};
            const chars = Object.keys(pool);
            const char = chars[Math.floor(Math.random() * chars.length)];
            const ans = pool[char];
            const all = [...new Set(Object.values(pool))];
            let opts = [ans];
            while(opts.length < 4) {
                const r = all[Math.floor(Math.random()*all.length)];
                if(!opts.includes(r)) opts.push(r);
            }
            opts = opts.sort(() => Math.random() - 0.5);
            currentKanaTarget = ans;
            document.getElementById('kana-display').innerText = char;
            document.getElementById('kana-score').innerText = `Score: ${kanaScore}`;
            document.getElementById('kana-options').innerHTML = opts.map(o => `
                <button onclick="checkKana('${o}')" class="glass py-4 rounded-2xl font-black text-slate-700 active:scale-95 transition-all text-sm">${o}</button>
            `).join('');
        };

        window.checkKana = (choice) => {
            if (choice === currentKanaTarget) { kanaScore++; nextKana(); }
            else showToast("Salah!", "error");
        };

        window.stopKanaQuiz = () => {
            clearInterval(kanaInterval);
            document.getElementById('kana-setup').classList.remove('hidden');
            document.getElementById('kana-active').classList.add('hidden');
        };

        // --- UI ---
        const updateUI = () => {
            const remNew = Math.max(0, settings.newLimit - settings.newDoneToday);
            const remRev = Math.max(0, settings.reviewLimit - settings.reviewDoneToday);
            document.getElementById('stat-new').innerText = `SISA BARU: ${remNew}`;
            document.getElementById('stat-rev').innerText = `SISA REV: ${remRev}`;
            document.getElementById('input-new-limit').value = settings.newLimit;
            document.getElementById('input-rev-limit').value = settings.reviewLimit;
            
            const sessionActive = activeQueue.length > 0;
            const finished = remNew === 0 && remRev === 0;

            if(!sessionActive) {
                document.getElementById('study-status').classList.remove('hidden');
                document.getElementById('study-active').classList.add('hidden');
                if(finished) {
                    document.getElementById('status-icon').innerText = "🎉";
                    document.getElementById('status-title').innerText = "おめでとうございます！";
                    document.getElementById('status-desc').innerHTML = "Selamat! Kartu Anda sudah selesai di-review dan dipelajari. Besok lagi ya...<br/><span class='font-bold text-indigo-500 mt-2 block'>お疲れ様でした！</span>";
                    document.getElementById('btn-start-session').classList.add('hidden');
                } else {
                    document.getElementById('status-icon').innerText = "🎯";
                    document.getElementById('status-title').innerText = "Sesi Belajar";
                    document.getElementById('btn-start-session').classList.remove('hidden');
                }
            } else {
                document.getElementById('study-status').classList.add('hidden');
                document.getElementById('study-active').classList.remove('hidden');
                const card = activeQueue[0];
                document.getElementById('display-front').innerText = card.f;
                document.getElementById('display-reading').innerText = card.r;
                document.getElementById('display-meaning').innerText = card.m;
                document.getElementById('session-counter').innerText = `${activeQueue.length} LAGI`;
                document.getElementById('session-progress').style.width = `${(1 - activeQueue.length / (activeQueue.length + settings.newDoneToday + settings.reviewDoneToday)) * 100}%`;
            }
        };

        window.switchView = (target) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${target}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            const btn = document.getElementById(`nav-${target === 'settings' ? 'study' : target}`);
            if(btn) btn.classList.add('nav-active');
            if(target !== 'kana') stopKanaQuiz();
        };

        window.toggleKana = (type) => {
            kanaConfig[type] = !kanaConfig[type];
            const btn = document.getElementById(`btn-${type}`);
            btn.classList.toggle('text-indigo-700', kanaConfig[type]);
            btn.classList.toggle('bg-indigo-50/50', kanaConfig[type]);
            btn.querySelector('.check-icon').classList.toggle('hidden', !kanaConfig[type]);
        };

        window.saveSettings = () => {
            settings.newLimit = parseInt(document.getElementById('input-new-limit').value) || 0;
            settings.reviewLimit = parseInt(document.getElementById('input-rev-limit').value) || 0;
            saveSettings(); showToast("Updated!", "success"); switchView('study'); updateUI();
        };

        const saveCards = () => localStorage.setItem('jmaster_v9_cards', JSON.stringify(cards));
        const saveSettings = () => localStorage.setItem('jmaster_v9_settings', JSON.stringify(settings));

        window.resetAllData = () => { if(confirm("Hapus progress?")) { localStorage.clear(); location.reload(); } };

        const renderList = () => {
            const list = document.getElementById('card-list');
            document.getElementById('list-count').innerText = cards.length;
            list.innerHTML = cards.map(c => `
                <div class="glass p-4 rounded-3xl flex justify-between items-center">
                    <div>
                        <div class="font-bold text-slate-800 text-sm">${c.f}</div>
                        <div class="text-[8px] text-slate-400 font-black uppercase">${c.r} • ${c.m}</div>
                    </div>
                    <div class="text-[8px] font-black text-indigo-400 bg-indigo-50/50 px-2 py-1 rounded-full">LV.${c.repetitions}</div>
                </div>
            `).join('');
        };

        const showToast = (msg, type) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-28 left-1/2 -translate-x-1/2 px-6 py-2.5 rounded-full text-[9px] font-black uppercase text-white shadow-2xl transition-all z-50 ${type === 'error' ? 'bg-rose-500' : 'bg-slate-900'}`;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2000);
        };

        init();
    </script>
</body>
</html>
