<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-MASTER SRS & KANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .perspective { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-sm">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black tracking-tighter">J-MASTER <span class="text-indigo-600 underline">SRS</span></h1>
            <div class="flex gap-2">
                <button onclick="showView('study')" class="text-[10px] font-bold bg-white px-3 py-1 rounded-full border">SRS</button>
                <button onclick="showView('kana')" class="text-[10px] font-bold bg-white px-3 py-1 rounded-full border">KANA</button>
            </div>
        </div>

        <div id="study-view" class="view space-y-4">
            <div id="counter" class="text-[10px] font-black text-indigo-400 bg-indigo-50 px-3 py-1 rounded-full inline-block">MEMUAT...</div>
            <div class="perspective h-80 w-full">
                <div id="flashcard" class="card-inner relative w-full h-full" onclick="flipCard()">
                    <div class="card-front bg-white rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col items-center justify-center p-6">
                        <span class="text-[9px] font-black text-slate-300 uppercase mb-6">Kanji</span>
                        <div id="card-front-text" class="text-6xl font-bold text-slate-800">一</div>
                    </div>
                    <div class="card-back bg-white rounded-[2.5rem] shadow-md border-2 border-indigo-50 flex flex-col items-center justify-center p-6">
                        <div id="card-reading" class="text-lg text-indigo-500 font-bold mb-1">いち</div>
                        <div id="card-meaning" class="text-2xl font-bold text-slate-800 text-center">Satu</div>
                    </div>
                </div>
            </div>
            <div id="controls" class="grid grid-cols-2 gap-3 opacity-0 pointer-events-none">
                <button onclick="nextCard(false)" class="py-4 rounded-2xl bg-orange-50 text-orange-500 font-bold text-[10px] uppercase border-b-4 border-orange-200">ULANG</button>
                <button onclick="nextCard(true)" class="py-4 rounded-2xl bg-indigo-600 text-white font-bold text-[10px] uppercase border-b-4 border-indigo-800">HAFAL</button>
            </div>
        </div>

        <div id="kana-view" class="view hidden space-y-6 text-center">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <span class="text-[9px] font-black text-slate-300 uppercase mb-4 block">Tebak Romaji</span>
                <div id="kana-char" class="text-7xl font-bold text-slate-800 mb-8">あ</div>
                <div id="kana-options" class="grid grid-cols-2 gap-3">
                    </div>
            </div>
            <div class="text-[10px] font-bold text-slate-400">SKOR: <span id="kana-score" class="text-indigo-600">0</span></div>
        </div>
    </div>

    <script>
        // Data
        const kanjiData = [
            { front: '人', reading: 'ひと', meaning: 'Orang' },
            { front: '日本', reading: 'にほん', meaning: 'Jepang' },
            { front: '水', reading: 'みず', meaning: 'Air' },
            { front: '行きます', reading: 'いきます', meaning: 'Pergi' }
        ];
        const kanaData = { 'あ': 'a', 'い': 'i', 'う': 'u', 'え': 'e', 'お': 'o', 'か': 'ka', 'き': 'ki' };

        let currentIndex = 0;
        let score = 0;

        // View Switcher
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewName + '-view').classList.remove('hidden');
            if(viewName === 'kana') initKana();
        }

        // SRS Logic
        function updateSRS() {
            const card = kanjiData[currentIndex % kanjiData.length];
            document.getElementById('card-front-text').innerText = card.front;
            document.getElementById('card-reading').innerText = card.reading;
            document.getElementById('card-meaning').innerText = card.meaning;
            document.getElementById('counter').innerText = `KARTU ${currentIndex + 1}`;
            document.getElementById('flashcard').classList.remove('is-flipped');
            document.getElementById('controls').classList.add('opacity-0');
        }

        function flipCard() {
            document.getElementById('flashcard').classList.add('is-flipped');
            document.getElementById('controls').classList.remove('opacity-0', 'pointer-events-none');
        }

        function nextCard() { currentIndex++; updateSRS(); }

        // Kana Logic
        function initKana() {
            const keys = Object.keys(kanaData);
            const target = keys[Math.floor(Math.random() * keys.length)];
            const romaji = kanaData[target];
            document.getElementById('kana-char').innerText = target;
            
            const options = [romaji, 'so', 'ka', 'ne'].sort(() => Math.random() - 0.5);
            const container = document.getElementById('kana-options');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold hover:bg-indigo-50";
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === romaji) { score++; document.getElementById('kana-score').innerText = score; initKana(); }
                    else alert('Salah! Coba lagi');
                };
                container.appendChild(btn);
            });
        }

        updateSRS();
    </script>
</body>
    </html>
