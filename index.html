<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Master SRS | Glass Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        .perspective { perspective: 1000px; }
        .card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back { transform: rotateY(180deg); }
        .nav-active {
            background: rgba(79, 70, 229, 0.1);
            border: 1px solid rgba(79, 70, 229, 0.2);
            color: #4f46e5;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="app" class="max-w-md mx-auto h-screen flex flex-col p-4 relative z-10">
        
        <!-- Background Shapes -->
        <div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-indigo-300 rounded-full blur-[100px] opacity-30 z-[-1]"></div>
        <div class="fixed bottom-[-10%] right-[-10%] w-64 h-64 bg-purple-300 rounded-full blur-[100px] opacity-30 z-[-1]"></div>

                    <span id="stat-rev" class="glass px-3 py-1 rounded-full uppercase">REV: --</span>

            </div>

            </button>
        </header>

        <!-- Container -->
        <main class="flex-1 overflow-hidden relative">
            
            <!-- View: Study -->
            <section id="view-study" class="view h-full flex flex-col animate-slide-up">
                <div id="study-status" class="flex-1 flex flex-col items-center justify-center text-center p-6 hidden">
                    <div id="status-icon" class="text-6xl mb-6 drop-shadow-lg">☕</div>
                    <h2 id="status-title" class="text-2xl font-black text-slate-800">Sesi Belajar</h2>
                    <p id="status-desc" class="text-slate-500 text-[11px] font-bold mt-2 mb-10 leading-relaxed px-8 uppercase tracking-widest">Siap memperkuat ingatan?</p>
                    <button onclick="startSession()" class="glass bg-indigo-600 text-white text-[10px] font-black uppercase tracking-widest px-12 py-5 rounded-[2rem] shadow-2xl active:scale-95 transition-all">Mulai Sesi</button>
                </div>

                <div id="study-active" class="flex-1 flex flex-col hidden">
                    <div class="flex items-center gap-4 mb-4 px-1">
                        <span id="session-counter" class="text-[10px] font-black text-slate-400 uppercase tracking-widest tabular-nums">0 / 0</span>
                        <div class="flex-1 h-2 glass rounded-full overflow-hidden">
                            <div id="session-progress" class="h-full bg-indigo-500 transition-all duration-700 w-0"></div>
                        </div>
                    </div>
                    <div class="flex-1 perspective">
                        <div id="flashcard" class="card-inner w-full h-full relative cursor-pointer" onclick="flipCard()">
                            <div class="card-front glass absolute inset-0 rounded-[3rem] flex flex-col items-center justify-center p-8">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-10 opacity-50">Pertanyaan</span>
                                <div id="display-front" class="text-7xl font-bold text-slate-800 tracking-tighter">--</div>
                                <div class="absolute bottom-12 text-indigo-400 text-[10px] font-black uppercase animate-pulse tracking-[0.2em]">Tap to flip</div>
                            </div>
                            <div class="card-back glass absolute inset-0 rounded-[3rem] flex flex-col items-center justify-center p-8 text-center border-indigo-200/50">
                                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4">Jawaban</span>
                                <div id="display-reading" class="text-lg text-indigo-500 font-bold mb-2 tracking-tight">--</div>
                                <div id="display-meaning" class="text-3xl font-black text-slate-800 leading-tight px-4">--</div>
                            </div>
                        </div>
                    </div>
                    <div id="srs-actions" class="mt-8 grid grid-cols-2 gap-4 opacity-0 pointer-events-none translate-y-6 transition-all duration-500">
                        <button onclick="handleRate(false)" class="glass py-6 rounded-[2rem] font-black text-[10px] text-orange-600 uppercase tracking-widest active:translate-y-1 active:bg-orange-100/50">Susah (Ulang)</button>
                        <button onclick="handleRate(true)" class="glass bg-indigo-600 py-6 rounded-[2rem] font-black text-[10px] text-white uppercase tracking-widest active:translate-y-1 shadow-lg shadow-indigo-200">Mudah (Lulus)</button>
                    </div>
                </div>
            </section>

            <!-- View: Kana -->
            <section id="view-kana" class="view h-full flex flex-col hidden animate-slide-up">
                <div id="kana-setup" class="h-full flex flex-col items-center justify-center text-center p-6">
                    <div class="w-24 h-24 glass rounded-full flex items-center justify-center mb-8 text-4xl shadow-inner shadow-white/50">あ</div>
                    <h2 class="text-2xl font-black text-slate-800 mb-2">Kana Blitz</h2>
                    <p class="text-[11px] text-slate-500 font-bold px-10 mb-10 leading-relaxed uppercase tracking-widest">Latih kecepatan membaca tanpa batas.</p>
                    <div class="glass p-5 rounded-[2.5rem] w-full space-y-3 mb-10">
                        <button onclick="toggleKana('hira')" id="btn-hira" class="w-full flex justify-between items-center p-5 rounded-2xl border text-xs font-black transition-all bg-indigo-50/50 border-indigo-200/50 text-indigo-700">
                            <span>Hiragana (あ)</span> <span class="check-icon">✓</span>
                        </button>
                        <button onclick="toggleKana('kata')" id="btn-kata" class="w-full flex justify-between items-center p-5 rounded-2xl border text-xs font-black transition-all bg-slate-50/50 border-slate-100 text-slate-400">
                            <span>Katakana (ア)</span> <span class="check-icon hidden">✓</span>
                        </button>
                    </div>
                    <button onclick="startKanaQuiz()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all shadow-2xl">Start Quiz</button>
                </div>
                <div id="kana-active" class="h-full flex flex-col hidden">

                    </div>
                    <div id="kana-options" class="grid grid-cols-2 gap-4 mt-10"></div>
                </div>
            </section>

            <!-- View: List -->
            <section id="view-list" class="view h-full flex flex-col hidden animate-slide-up">
                <h2 class="text-sm font-black text-slate-800 mb-6 flex justify-between items-center px-2">
                    Koleksi <span id="list-count" class="glass px-4 py-1 rounded-full text-[10px] text-indigo-600">0</span>

                <div class="space-y-6">
                    <div class="glass p-8 rounded-[3rem] space-y-6">

                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 uppercase mb-3 block tracking-widest">Review / Hari</label>

                        </div>

                    <button onclick="resetAllData()" class="w-full bg-white text-red-500 border border-red-100 text-[10px] font-black uppercase py-4 rounded-[2rem] active:bg-red-50">Reset Semua Data</button>

            </section>
        </main>
