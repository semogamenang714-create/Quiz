<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-MASTER SRS & KANA - Pastel Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fbcfe8 0%, #dbeafe 50%, #fef9c3 100%);
            min-height: 100vh;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .perspective { perspective: 1000px; }
        
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .is-flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-back { transform: rotateY(180deg); }

        /* Smooth Animation for buttons */
        .btn-pastel {
            transition: all 0.2s ease;
        }
        .btn-pastel:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-sm">
        
        <div class="flex justify-between items-center mb-8 mt-4">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">J-MASTER <span class="text-pink-500">SRS</span></h1>
            <div class="flex gap-2 glass p-1 rounded-2xl">
                <button onclick="showView('study')" class="text-[10px] font-bold px-4 py-2 rounded-xl transition-all hover:bg-white/50">SRS</button>
                <button onclick="showView('kana')" class="text-[10px] font-bold px-4 py-2 rounded-xl transition-all hover:bg-white/50">KANA</button>
            </div>
        </div>

        <div id="study-view" class="view space-y-6">
            <div class="perspective h-96 w-full">
                <div id="flashcard" class="card-inner" onclick="flipCard()">
                    <div class="card-front glass shadow-lg">
                        <span class="text-[10px] font-bold text-pink-400 uppercase tracking-widest mb-4">Kanji</span>
                        <div id="card-front-text" class="text-7xl font-bold text-slate-700">人</div>
                        <div class="mt-12 text-slate-400 text-[10px] animate-pulse">Tap untuk arti</div>
                    </div>
                    <div class="card-back glass shadow-xl border-white">
                        <div id="card-reading" class="text-xl text-blue-500 font-bold mb-2">ひと</div>
                        <div id="card-meaning" class="text-3xl font-bold text-slate-800 text-center px-6">Orang</div>
                    </div>
                </div>
            </div>
            
            <div id="controls" class="grid grid-cols-2 gap-4 opacity-0 transition-all duration-500 translate-y-4">
                <button onclick="nextCard()" class="btn-pastel py-4 rounded-2xl bg-white/60 text-slate-500 font-bold text-xs shadow-sm border border-white">ULANG</button>
                <button onclick="nextCard()" class="btn-pastel py-4 rounded-2xl bg-pink-400 text-white font-bold text-xs shadow-md shadow-pink-200">HAFAL ✨</button>
            </div>
        </div>

        <div id="kana-view" class="view hidden space-y-6">
            <div class="glass p-8 rounded-[3rem] text-center relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-200/30 rounded-full blur-2xl"></div>
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-4 block">Tebak Romaji</span>
                <div id="kana-char" class="text-8xl font-bold text-slate-700 mb-10">あ</div>
                <div id="kana-options" class="grid grid-cols-2 gap-4"></div>
            </div>
            <div class="glass py-3 px-6 rounded-full inline-block mx-auto text-center w-full">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Skor Kamu: </span>
                <span id="kana-score" class="text-lg font-bold text-pink-500">0</span>
            </div>
        </div>
    </div>

    <script>
        const kanjiData = [
            { f: '人', r: 'ひと', m: 'Orang' }, { f: '水', r: 'みず', m: 'Air' }, { f: '日本', r: 'にほん', m: 'Jepang' }, { f: '行きます', r: 'いきます', m: 'Pergi' }, { f: '食べます', r: 'たべます', m: 'Makan' }, { f: '見ます', r: 'みます', m: 'Melihat' }
        ];
        const kanaData = { 'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','さ':'sa','し':'shi','す':'su','せ':'se','そ':'so' };
        let cur = 0; let score = 0;

        function showView(v) {
            document.querySelectorAll('.view').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('animate-in', 'fade-in', 'slide-in-from-bottom-4');
            });
            const target = document.getElementById(v + '-view');
            target.classList.remove('hidden');
            // Basic animation
            target.style.animation = 'fadeIn 0.5s ease-out forwards';
            if(v === 'kana') initKana();
        }

        function flipCard() {
            document.getElementById('flashcard').classList.add('is-flipped');
            const controls = document.getElementById('controls');
            controls.classList.remove('opacity-0', 'translate-y-4');
        }

        function nextCard() {
            cur = (cur + 1) % kanjiData.length;
            document.getElementById('card-front-text').innerText = kanjiData[cur].f;
            document.getElementById('card-reading').innerText = kanjiData[cur].r;
            document.getElementById('card-meaning').innerText = kanjiData[cur].m;
            document.getElementById('flashcard').classList.remove('is-flipped');
            document.getElementById('controls').classList.add('opacity-0', 'translate-y-4');
        }

        function initKana() {
            const keys = Object.keys(kanaData);
            const target = keys[Math.floor(Math.random() * keys.length)];
            const correct = kanaData[target];
            document.getElementById('kana-char').innerText = target;
            const allOpts = Object.values(kanaData);
            let opts = [correct];
            while(opts.length < 4) {
                let r = allOpts[Math.floor(Math.random() * allOpts.length)];
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            
            const btnContainer = document.getElementById('kana-options');
            btnContainer.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "btn-pastel py-5 bg-white/50 border border-white rounded-[1.5rem] font-bold text-slate-600 shadow-sm hover:bg-white";
                b.innerText = o;
                b.onclick = () => {
                    if(o === correct) { 
                        score++; 
                        document.getElementById('kana-score').innerText = score; 
                        initKana(); 
                    } else {
                        b.classList.add('bg-red-100', 'border-red-200');
                        setTimeout(() => b.classList.remove('bg-red-100', 'border-red-200'), 500);
                    }
                };
                btnContainer.appendChild(b);
            });
        }
    </script>
</body>
</html>
